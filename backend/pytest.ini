[pytest]
# Pytest configuration for Anomaly Detector project

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, with dependencies)
    asyncio: Async tests
    slow: Slow running tests
    security: Security and RBAC tests
    monitoring: Monitoring and performance tests

# Test paths
testpaths = tests

# Logging options
log_cli = false
log_cli_level = DEBUG
log_file = tests/logs/pytest.log
log_file_level = DEBUG

# Coverage options (if pytest-cov is installed)
# --cov=src
# --cov-report=html
# --cov-report=term-missing

# Timeout for tests (requires pytest-timeout)
# timeout = 60

# Asyncio mode (if using pytest-asyncio)
asyncio_mode = auto
